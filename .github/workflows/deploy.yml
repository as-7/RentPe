name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'  # Only deploy if backend files changed

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          chmod +x /home/ec2-user/RentPe/backend/deploy.sh
          bash /home/ec2-user/RentPe/backend/deploy.sh
