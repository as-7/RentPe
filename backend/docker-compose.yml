version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rentpe
    ports:
      - "5432:5432"
    volumes:
      - rentpe_pg_data:/var/lib/postgresql/data

volumes:
  rentpe_pg_data:
